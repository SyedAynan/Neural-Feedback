<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | FacultyLens</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:"Poppins",sans-serif;
  background:#0a0a0f;
  color:#eaeaea;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow:hidden;
}

.glow { position:fixed; width:600px; height:600px; background:radial-gradient(circle,rgba(140,70,255,0.5),transparent); top:-150px; right:-100px; filter:blur(150px); z-index:-1; animation:f 14s infinite alternate ease-in-out; }
.glow-2 { position:fixed; width:400px; height:400px; background:radial-gradient(circle,rgba(255,107,107,0.2),transparent); bottom:-100px; left:-100px; filter:blur(120px); z-index:-1; animation:f 18s infinite alternate ease-in-out; }
@keyframes f { from{transform:translate(0,0)} to{transform:translate(-80px,60px)} }

.card {
  text-align:center;
  padding:50px 40px;
  max-width:480px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:24px;
  backdrop-filter:blur(20px);
  box-shadow:0 25px 60px rgba(140,80,255,0.2);
  animation:pop 0.8s ease;
}

@keyframes pop {
  from { opacity:0; transform:scale(0.9) translateY(30px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.error-code {
  font-size:120px;
  font-weight:800;
  background:linear-gradient(135deg,#9b6bff,#ff6b6b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
  margin-bottom:8px;
  text-shadow:0 0 40px rgba(155,107,255,0.3);
}

h2 {
  font-size:24px;
  color:#d6c9ff;
  margin-bottom:12px;
}

p {
  color:#bfb5e0;
  font-size:14px;
  line-height:1.7;
  margin-bottom:28px;
}

.btn-group { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }

.btn {
  padding:13px 24px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  font-size:14px;
  transition:all 0.3s ease;
  display:inline-block;
}

.btn-primary {
  background:linear-gradient(135deg,#9b6bff,#6d2cff);
  color:#fff;
  box-shadow:0 8px 22px rgba(140,80,255,0.4);
}

.btn-primary:hover {
  transform:translateY(-3px);
  box-shadow:0 14px 30px rgba(140,80,255,0.6);
}

.btn-secondary {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  color:#d9c4ff;
}

.btn-secondary:hover {
  background:rgba(255,255,255,0.1);
  color:#fff;
  transform:translateY(-2px);
}

/* Floating particles */
.particle {
  position:fixed;
  width:4px; height:4px;
  background:rgba(155,107,255,0.3);
  border-radius:50%;
  animation:rise linear infinite;
}
.particle:nth-child(1) { left:10%; animation-duration:12s; }
.particle:nth-child(2) { left:25%; animation-duration:16s; width:6px; height:6px; }
.particle:nth-child(3) { left:45%; animation-duration:20s; }
.particle:nth-child(4) { left:65%; animation-duration:14s; width:5px; height:5px; }
.particle:nth-child(5) { left:85%; animation-duration:18s; }

@keyframes rise {
  from { transform:translateY(100vh); opacity:0; }
  10% { opacity:1; }
  90% { opacity:1; }
  to { transform:translateY(-10vh); opacity:0; }
}
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow-2"></div>

<span class="particle"></span>
<span class="particle"></span>
<span class="particle"></span>
<span class="particle"></span>
<span class="particle"></span>

<div class="card">
  <div class="error-code">404</div>
  <h2>Page Not Found</h2>
  <p>
    The page you're looking for doesn't exist or has been moved.<br>
    Let's get you back on track.
  </p>
  <div class="btn-group">
    <a href="FRONTEND/dashboard.html" class="btn btn-primary">Go to Dashboard</a>
    <a href="FRONTEND/index.html" class="btn btn-secondary">Back to Login</a>
  </div>
</div>

</body>
</html>
