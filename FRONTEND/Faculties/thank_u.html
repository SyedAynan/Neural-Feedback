<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Submitted | DSE Portal</title>

  <!-- GOOGLE FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Poppins", sans-serif;
      background: radial-gradient(circle at top, #120a24, #07070c);
      color: #eaeaea;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      padding: 20px;
    }

    /* FLOATING PARTICLES */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: rgba(170,120,255,0.4);
      border-radius: 50%;
      animation: float 14s infinite linear;
    }

    .particle:nth-child(1) { left: 15%; animation-duration: 18s; }
    .particle:nth-child(2) { left: 40%; animation-duration: 14s; }
    .particle:nth-child(3) { left: 65%; animation-duration: 20s; }
    .particle:nth-child(4) { left: 85%; animation-duration: 16s; }

    @keyframes float {
      from { transform: translateY(110vh); }
      to { transform: translateY(-10vh); }
    }

    /* GLASS CARD */
    .glass-card {
      width: 420px;
      background: rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 42px 36px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 60px rgba(140,80,255,0.25);
      animation: enter 1.1s ease;
      z-index: 2;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* SUCCESS ICON */
    .success-icon {
      width: 88px;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 14px rgba(180,130,255,0.6));
      animation: pop 0.8s ease forwards;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 38px;
      font-weight: 700;
      color: #e3d9ff;
      margin-bottom: 10px;
      text-shadow: 0 0 14px rgba(160,120,255,0.5);
    }

    p {
      font-size: 15.5px;
      line-height: 1.65;
      opacity: 0.85;
      margin-bottom: 26px;
    }

    /* BUTTONS */
    .btn {
      display: block;
      width: 100%;
      padding: 14px 0;
      border-radius: 14px;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      transition: all 0.35s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #a56bff, #6f46ff);
      color: #fff;
      box-shadow: 0 10px 30px rgba(120,70,255,0.6);
      margin-bottom: 14px;
    }

    .btn-primary:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 18px 40px rgba(150,100,255,0.85);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: #d9c4ff;
    }

    .btn-secondary:hover {
      background: rgba(170,120,255,0.25);
      color: #fff;
      transform: translateY(-4px);
      box-shadow: 0 0 18px rgba(180,130,255,0.6);
    }

    .btn:active {
      transform: scale(0.96);
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .glass-card {
        width: 100%;
        padding: 36px 26px;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>

<body>

  <!-- PARTICLES -->
  <span class="particle"></span>
  <span class="particle"></span>
  <span class="particle"></span>
  <span class="particle"></span>

  <div class="glass-card">
    <img
      src="https://cdn-icons-png.flaticon.com/512/190/190411.png"
      alt="Success"
      class="success-icon"
    />

    <h1>Thank You!</h1>

    <p>
      Your feedback has been submitted successfully.<br />
      We truly appreciate your contribution to improving the <strong>DSE Portal</strong>.
    </p>

    <a href="faculties.html" class="btn btn-primary">Back to Faculty</a>
    <a href="../essentials/submit-feedback.html" class="btn btn-secondary">Submit Another Feedback</a>
  </div>

</body>
</html>
