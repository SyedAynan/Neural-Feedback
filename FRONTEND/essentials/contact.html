<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Support Submitted | Feedback Portal</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: "Poppins", sans-serif;
        background: linear-gradient(135deg, #12121f, #1a1a38);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        padding: 45px;
        width: 430px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0px 0px 30px rgba(0, 0, 0, 0.6);
        animation: fadeIn 0.7s ease;
    }

    .check-icon {
        font-size: 80px;
        color: #4fff8d;
        margin-bottom: 15px;
        font-weight: bold;
        text-shadow: 0 0 10px #4fff8d,
                     0 0 20px #4fff8d,
                     0 0 40px #4fff8d;
        animation: pulse 1.5s infinite ease-in-out;
    }

    h2 {
        font-size: 26px;
        margin-bottom: 10px;
        font-weight: 600;
    }

    p {
        font-size: 15px;
        margin-bottom: 25px;
        line-height: 1.6;
        opacity: 0.9;
    }

    .btn {
        display: inline-block;
        padding: 12px 22px;
        background: #6c63ff;
        color: white;
        text-decoration: none;
        font-size: 15px;
        border-radius: 10px;
        transition: 0.3s ease;
        font-weight: 500;
        box-shadow: 0 0 12px rgba(108, 99, 255, 0.5);
    }

    .btn:hover {
        background: #8c85ff;
        transform: scale(1.08);
        box-shadow: 0 0 16px rgba(140, 133, 255, 0.8);
    }

    /* Animations */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
        0% { transform: scale(1); text-shadow: 0 0 10px #4fff8d, 0 0 20px #4fff8d; }
        50% { transform: scale(1.15); text-shadow: 0 0 20px #4fff8d, 0 0 40px #4fff8d; }
        100% { transform: scale(1); text-shadow: 0 0 10px #4fff8d, 0 0 20px #4fff8d; }
    }
</style>
</head>

<body>

<div class="container">
    <div class="check-icon">✔</div>

    <h2>Support Request Submitted</h2>
    <p>
        Your support issue has been received.<br>
        Our support team will get back to you shortly.
    </p>

    <!-- Button Action -->
    <a href="../dashboard.html" class="btn">Return to Dashboard</a>
</div>

</body>
</html>
