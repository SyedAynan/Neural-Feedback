<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Faculty — FacultyLens</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0a0a0f; --glass:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.12); --accent:#9b6bff; --text:#eaeaea; --muted:#bfb5e0; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Poppins",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

.glow-bg { position:fixed; width:700px; height:700px; background:radial-gradient(circle,rgba(140,70,255,0.45),transparent); top:-200px; left:50%; transform:translateX(-50%); filter:blur(160px); z-index:-1; }

.nav { background:var(--glass); border-bottom:1px solid var(--border); backdrop-filter:blur(18px); padding:16px 40px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
.nav a { color:var(--muted); text-decoration:none; font-weight:500; transition:0.3s; }
.nav a:first-child { font-size:24px; font-weight:700; color:#d2c7ff; }
.nav-links { display:flex; gap:22px; }
.nav a:hover { color:#d5b4ff; }

.container { max-width:1000px; margin:40px auto; padding:0 20px; }
.page-title { text-align:center; margin-bottom:32px; }
.page-title h1 { font-size:30px; color:#d6c9ff; text-shadow:0 0 14px rgba(160,120,255,0.4); margin-bottom:6px; }
.page-title p { color:var(--muted); font-size:14px; }

/* Selectors */
.selector-row { display:grid; grid-template-columns:1fr auto 1fr; gap:16px; align-items:end; margin-bottom:32px; }
.selector { display:flex; flex-direction:column; }
.selector label { font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:600; }
.selector select { padding:14px 16px; border-radius:12px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.18); color:#fff; font-family:"Poppins",sans-serif; font-size:14px; outline:none; transition:0.3s; }
.selector select:focus { border-color:var(--accent); box-shadow:0 0 12px rgba(155,107,255,0.5); }
.selector select option { background:#1a1a2e; }
.vs { font-size:28px; font-weight:700; color:#c084fc; text-align:center; padding-bottom:12px; text-shadow:0 0 12px rgba(192,132,252,0.5); }

/* Comparison Card */
.compare-card { background:var(--glass); border:1px solid var(--border); border-radius:22px; padding:32px; backdrop-filter:blur(18px); box-shadow:0 0 30px rgba(140,80,255,0.15); }

.compare-header { display:grid; grid-template-columns:1fr 1fr; gap:24px; text-align:center; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.06); }
.compare-name { font-size:20px; font-weight:700; color:#d6c9ff; }
.compare-role { font-size:13px; color:var(--muted); }

/* Bar Comparison */
.metric-row { display:grid; grid-template-columns:1fr auto 1fr; gap:12px; align-items:center; margin-bottom:18px; }
.metric-label { text-align:center; font-size:13px; font-weight:600; color:var(--muted); min-width:100px; }

.bar-container { height:28px; border-radius:8px; background:rgba(255,255,255,0.04); overflow:hidden; position:relative; }
.bar-fill { height:100%; border-radius:8px; transition:width 1s ease; position:relative; }
.bar-fill.left { background:linear-gradient(90deg,#6d2cff,#9b6bff); float:right; }
.bar-fill.right { background:linear-gradient(90deg,#0ea5e9,#38bdf8); }
.bar-score { position:absolute; top:50%; transform:translateY(-50%); font-size:12px; font-weight:700; color:#fff; padding:0 8px; }
.bar-fill.left .bar-score { left:8px; }
.bar-fill.right .bar-score { right:8px; }

/* Radar placeholder */
.radar-section { margin-top:28px; text-align:center; }
.radar-section h3 { font-size:16px; color:#d6c9ff; margin-bottom:16px; }

.radar-chart { display:inline-block; position:relative; width:300px; height:300px; }
.radar-bg { position:absolute; inset:0; }
.radar-bg circle { fill:none; stroke:rgba(255,255,255,0.06); }
.radar-bg line { stroke:rgba(255,255,255,0.06); }

/* Winner Banner */
.winner-banner { text-align:center; margin-top:24px; padding:16px; border-radius:14px; background:linear-gradient(135deg,rgba(155,107,255,0.15),rgba(94,199,255,0.1)); border:1px solid rgba(155,107,255,0.25); }
.winner-banner .trophy { font-size:36px; }
.winner-banner .winner-name { font-size:18px; font-weight:700; color:#feca57; margin-top:4px; }
.winner-banner .winner-sub { font-size:13px; color:var(--muted); }

.hidden { display:none; }

@media(max-width:600px) {
  .selector-row { grid-template-columns:1fr; }
  .vs { display:none; }
  .metric-row { grid-template-columns:1fr; gap:6px; }
  .compare-header { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="glow-bg"></div>

<nav class="nav">
  <a href="dashboard.html">FacultyLens</a>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="Faculties/faculties.html">Faculty</a>
    <a href="essentials/submit-feedback.html">Submit</a>
    <a href="essentials/report.html">Reports</a>
  </div>
</nav>

<div class="container">
  <div class="page-title">
    <h1>⚖️ Faculty Comparison</h1>
    <p>Compare two faculty members side by side across all metrics</p>
  </div>

  <!-- Faculty Selectors -->
  <div class="selector-row">
    <div class="selector">
      <label>Faculty A</label>
      <select id="facultyA">
        <option value="" disabled selected>Select faculty...</option>
      </select>
    </div>
    <div class="vs">VS</div>
    <div class="selector">
      <label>Faculty B</label>
      <select id="facultyB">
        <option value="" disabled selected>Select faculty...</option>
      </select>
    </div>
  </div>

  <!-- Comparison Results -->
  <div class="compare-card hidden" id="compareCard">
    <div class="compare-header">
      <div>
        <div class="compare-name" id="nameA">—</div>
        <div class="compare-role" id="roleA"></div>
      </div>
      <div>
        <div class="compare-name" id="nameB">—</div>
        <div class="compare-role" id="roleB"></div>
      </div>
    </div>

    <!-- Metrics -->
    <div id="metricsContainer"></div>

    <!-- Winner -->
    <div class="winner-banner" id="winnerBanner">
      <div class="trophy">🏆</div>
      <div class="winner-name" id="winnerName">—</div>
      <div class="winner-sub">Higher overall rating based on student feedback</div>
    </div>
  </div>
</div>

<script>
const facultyData = [
  { name:"Dr. Adarsh M J",         role:"HOD & Associate Professor",   clarity:9.5, knowledge:9.8, interaction:9.2, overall:9.5 },
  { name:"Prof. Gagana Deepa J",   role:"Branch Coordinator",          clarity:9.0, knowledge:9.2, interaction:9.5, overall:9.2 },
  { name:"Prof. Srikanth A S",     role:"Mathematics Faculty",         clarity:9.0, knowledge:9.5, interaction:9.0, overall:9.2 },
  { name:"Prof. Harshitha H D",    role:"Data Structures Faculty",     clarity:9.0, knowledge:9.0, interaction:9.5, overall:9.2 },
  { name:"Prof. Shalini I.S",      role:"DDCO Faculty",                clarity:8.5, knowledge:9.0, interaction:8.8, overall:8.8 },
  { name:"Dr. Thayaba Nausheen A", role:"Operating System Faculty",    clarity:8.8, knowledge:9.2, interaction:8.5, overall:8.8 },
  { name:"Prof. Ramya C K",        role:"Python Faculty",              clarity:9.0, knowledge:9.0, interaction:9.0, overall:9.0 },
  { name:"Prof. Pallavi C.S",      role:"PHP Faculty",                 clarity:8.5, knowledge:8.8, interaction:8.5, overall:8.6 },
  { name:"Prof. Seema B S",        role:"SCR Activity Faculty",        clarity:8.8, knowledge:8.5, interaction:9.0, overall:8.8 }
];

const metrics = ["clarity", "knowledge", "interaction", "overall"];
const metricLabels = { clarity:"Clarity", knowledge:"Knowledge", interaction:"Interaction", overall:"Overall" };

const selA = document.getElementById("facultyA");
const selB = document.getElementById("facultyB");

// Populate selects
facultyData.forEach((f, i) => {
  selA.innerHTML += `<option value="${i}">${f.name}</option>`;
  selB.innerHTML += `<option value="${i}">${f.name}</option>`;
});

function compare() {
  if (selA.value === "" || selB.value === "") return;
  const a = facultyData[selA.value];
  const b = facultyData[selB.value];

  document.getElementById("compareCard").classList.remove("hidden");
  document.getElementById("nameA").textContent = a.name;
  document.getElementById("roleA").textContent = a.role;
  document.getElementById("nameB").textContent = b.name;
  document.getElementById("roleB").textContent = b.role;

  const container = document.getElementById("metricsContainer");
  container.innerHTML = "";

  let totalA = 0, totalB = 0;

  metrics.forEach(m => {
    const va = a[m], vb = b[m];
    totalA += va; totalB += vb;
    const pctA = (va / 10) * 100;
    const pctB = (vb / 10) * 100;

    container.innerHTML += `
      <div class="metric-row">
        <div class="bar-container">
          <div class="bar-fill left" style="width:${pctA}%">
            <span class="bar-score">${va}/10</span>
          </div>
        </div>
        <div class="metric-label">${metricLabels[m]}</div>
        <div class="bar-container">
          <div class="bar-fill right" style="width:${pctB}%">
            <span class="bar-score">${vb}/10</span>
          </div>
        </div>
      </div>
    `;
  });

  // Winner
  const winner = totalA > totalB ? a.name : totalB > totalA ? b.name : "It's a tie!";
  document.getElementById("winnerName").textContent = winner;
}

selA.addEventListener("change", compare);
selB.addEventListener("change", compare);
</script>
</body>
</html>
