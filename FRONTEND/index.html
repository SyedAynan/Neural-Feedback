<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FacultyLens | Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FacultyLens — Anonymous faculty feedback portal for Data Science Engineering. Log in to share your voice.">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="theme.css">
</head>

<body>

  <!-- Glow -->
  <div class="glow-bg"></div>

  <!-- Logo -->
  <div class="logo">FacultyLens</div>

  <!-- Main Container -->
  <div class="container">

    <!-- Image -->
    <div class="teacher-box">
      <img src="assets/teacher.png" class="teacher-img" alt="Teacher illustration">
    </div>

    <!-- Login Card -->
    <div class="login-box">

      <h2>Log in</h2>
      <p class="cool-msg">
        Welcome to <strong>FacultyLens</strong><br>
        Where your voice defines excellence.
      </p>

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email">
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password">
        <span class="eye-icon" id="toggleEye">👁</span>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" id="rememberMe"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button id="loginBtn">Log in</button>

      <div class="divider">Or log in with</div>

      <div class="oauth-buttons">
        <button class="oauth google" id="googleLogin">Continue with Google</button>
        <button class="oauth apple" id="appleLogin">Continue with Apple</button>
      </div>

      <p class="error" id="errorMsg"></p>

      <div class="signup-link" style="text-align:center; margin-top:16px; font-size:14px; color:#bfb5e0;">
        Don't have an account? <a href="signup.html" style="color:#c9a6ff; font-weight:600; text-decoration:none;">Sign up</a>
      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="login.js"></script>
</body>
</html>
